<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بطاقة شخصية</title>
    <style>
        /* إعادة تعيين واستايل عام */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://i.postimg.cc/3Jq1M5hx/1781710572194.png') no-repeat center center/cover;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* البطاقة */
        .card {
            --main-color: #fff;
            --submain-color: #ccc;
            --bg-color: #000;
            position: relative;
            width: 300px;
            height: 384px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 20px;
            background: var(--bg-color);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* صورة الغلاف */
        .card__img {
            height: 192px;
            width: 100%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card__img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
        }

        /* الصورة الدائرية (البروفيل) */
        .card__avatar {
            position: absolute;
            width: 114px;
            height: 114px;
            background: var(--bg-color);
            border-radius: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            top: calc(50% - 57px);
            overflow: hidden;
            border: 4px solid var(--bg-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        .card__avatar img {
            width: 100px;
            height: 100px;
            border-radius: 100%;
            object-fit: cover;
        }

        /* النصوص */
        .card__title {
            margin-top: 60px;
            font-weight: 600;
            font-size: 20px;
            color: var(--main-color);
            letter-spacing: 0.5px;
        }

        .card__subtitle {
            margin-top: 6px;
            font-weight: 400;
            font-size: 15px;
            color: var(--submain-color);
            letter-spacing: 0.3px;
        }

        /* أزرار السوشل ميديا */
        .card__social {
            margin-top: 18px;
            display: flex;
            gap: 16px;
        }

        .card__social a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid var(--main-color);
            color: var(--main-color);
            text-decoration: none;
            transition: all 0.3s ease;
            background: var(--bg-color);
        }

        .card__social a:hover {
            background: var(--main-color);
            color: var(--bg-color);
            transform: scale(1.12) translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
        }

        .card__social svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* أيقونة القناة (تحتاج إلى stroke للأشكال الدائرية) */
        .card__social a:last-child svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .card__social a:last-child svg path:last-child {
            fill: currentColor;
            stroke: none;
        }

        /* تحسينات للهواتف */
        @media (max-width: 400px) {
            .card {
                width: 280px;
                height: 360px;
            }
            .card__social a {
                width: 40px;
                height: 40px;
            }
            .card__social svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ====== البطاقة ====== -->
    <div class="card">

        <!-- صورة الغلاف -->
        <div class="card__img">
            <img src="https://i.postimg.cc/3Jq1M5hx/1781710572194.png" alt="صورة الغلاف">
        </div>

        <!-- الصورة الدائرية (البروفيل) -->
        <div class="card__avatar">
            <img src="https://i.postimg.cc/3Jq1M5hx/1781710572194.png" alt="الصورة الشخصية">
        </div>

        <!-- الاسم والوصف -->
        <div class="card__title">Cameron Williamson</div>
        <div class="card__subtitle">Web Development</div>

        <!-- أزرار السوشل ميديا -->
        <div class="card__social">

        </div>
    </div>

</body>
</html>
