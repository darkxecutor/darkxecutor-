<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الصفحة الشخصية</title>
    <style>
        /* إعادة تعيين كامل */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #0a0a0a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding-top: 20px;
        }

        /* الصفحة - تمتد لملء الشاشة بالكامل */
        .page {
            --main-color: #fff;
            --submain-color: #aaa;
            --bg-color: #111;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: var(--bg-color);
            padding: 20px 20px 0;
            position: relative;
            overflow-y: auto;
        }

        /* صورة الغلاف - تظهر كاملة */
        .page__cover {
            width: 100%;
            max-width: 500px;
            height: auto;
            overflow: hidden;
            border-radius: 16px 16px 0 0;
            flex-shrink: 0;
            margin-top: 0;
        }

        .page__cover img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* الصورة الدائرية (البروفيل) */
        .page__avatar {
            width: 130px;
            height: 130px;
            background: var(--bg-color);
            border-radius: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -65px;
            overflow: hidden;
            border: 5px solid var(--bg-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
        }

        .page__avatar img {
            width: 116px;
            height: 116px;
            border-radius: 100%;
            object-fit: cover;
        }

        /* النصوص */
        .page__title {
            margin-top: 14px;
            font-weight: 600;
            font-size: 26px;
            color: var(--main-color);
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .page__title img {
            max-width: 100%;
            height: auto;
        }

        .page__subtitle {
            margin-top: 4px;
            font-weight: 400;
            font-size: 16px;
            color: var(--submain-color);
            letter-spacing: 0.3px;
        }

        /* وصف إضافي */
        .page__bio {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
        }

        /* ===== أيقونات السوشل ميديا من Uiverse ===== */
        .wrapper {
            display: inline-flex;
            list-style: none;
            height: 120px;
            width: 100%;
            padding-top: 20px;
            font-family: "Poppins", sans-serif;
            justify-content: center;
            margin-top: 0;
        }

        .wrapper .icon {
            position: relative;
            background: #fff;
            border-radius: 50%;
            margin: 10px;
            width: 50px;
            height: 50px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .wrapper .tooltip {
            position: absolute;
            top: 0;
            font-size: 14px;
            color: #fff;
            padding: 5px 8px;
            border-radius: 5px;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .wrapper .tooltip::before {
            position: absolute;
            content: "";
            height: 8px;
            width: 8px;
            bottom: -3px;
            left: 50%;
            transform: translate(-50%) rotate(45deg);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .wrapper .icon:hover .tooltip {
            top: -45px;
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .wrapper .icon:hover span,
        .wrapper .icon:hover .tooltip {
            text-shadow: 0px -1px 0px rgba(0, 0, 0, 0.1);
        }

        /* الأيقونات باللون الأسود في الحالة العادية */
        .wrapper .icon svg {
            fill: #000;
        }

        .wrapper .icon a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }

        /* إنستغرام - اللون الوردي عند التمرير */
        .wrapper .instagram:hover,
        .wrapper .instagram:hover .tooltip,
        .wrapper .instagram:hover .tooltip::before {
            background: #e4405f;
            color: #fff;
        }

        .wrapper .instagram:hover svg {
            fill: #fff;
        }

        /* واتساب - اللون الأخضر عند التمرير */
        .wrapper .whatsapp:hover,
        .wrapper .whatsapp:hover .tooltip,
        .wrapper .whatsapp:hover .tooltip::before {
            background: #25d366;
            color: #fff;
        }

        .wrapper .whatsapp:hover svg {
            fill: #fff;
        }

        /* يوتيوب - اللون الأحمر عند التمرير */
        .wrapper .youtube:hover,
        .wrapper .youtube:hover .tooltip,
        .wrapper .youtube:hover .tooltip::before {
            background: #ff0000;
            color: #fff;
        }

        .wrapper .youtube:hover svg {
            fill: #fff;
        }

        /* جيت هوب - اللون البنفسجي عند التمرير */
        .wrapper .github:hover,
        .wrapper .github:hover .tooltip,
        .wrapper .github:hover .tooltip::before {
            background: #6e5494;
            color: #fff;
        }

        .wrapper .github:hover svg {
            fill: #fff;
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 480px) {
            .page {
                padding: 10px 10px 0;
            }
            .page__cover {
                max-width: 100%;
            }
            .page__avatar {
                width: 110px;
                height: 110px;
                margin-top: -55px;
            }
            .page__avatar img {
                width: 98px;
                height: 98px;
            }
            .page__title {
                font-size: 22px;
                margin-top: 10px;
            }
            .page__subtitle {
                font-size: 14px;
            }
            .page__bio {
                font-size: 13px;
                max-width: 260px;
            }
            .wrapper .icon {
                width: 44px;
                height: 44px;
                margin: 8px;
            }
            .wrapper .icon svg {
                width: 20px;
                height: 20px;
            }
            .wrapper {
                height: 100px;
                padding-top: 10px;
            }
        }

        @media (max-height: 700px) {
            .page__avatar {
                width: 100px;
                height: 100px;
                margin-top: -50px;
            }
            .page__avatar img {
                width: 88px;
                height: 88px;
            }
            .page__title {
                font-size: 20px;
                margin-top: 8px;
            }
            .page__subtitle {
                font-size: 14px;
            }
            .page__bio {
                font-size: 12px;
                margin-top: 6px;
            }
            .wrapper {
                height: 90px;
                padding-top: 10px;
            }
            .wrapper .icon {
                width: 40px;
                height: 40px;
                margin: 6px;
            }
            .wrapper .icon svg {
                width: 18px;
                height: 18px;
            }
        }

        @media (max-height: 600px) {
            .page__avatar {
                width: 80px;
                height: 80px;
                margin-top: -40px;
            }
            .page__avatar img {
                width: 70px;
                height: 70px;
            }
            .page__title {
                font-size: 17px;
                margin-top: 6px;
            }
            .page__subtitle {
                font-size: 12px;
            }
            .page__bio {
                font-size: 11px;
                margin-top: 4px;
                max-width: 200px;
            }
            .wrapper {
                height: 70px;
                padding-top: 6px;
            }
            .wrapper .icon {
                width: 34px;
                height: 34px;
                margin: 4px;
            }
            .wrapper .icon svg {
                width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
